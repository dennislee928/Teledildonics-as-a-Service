name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go Unit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go test suite
        run: go test ./...

  go-stateful:
    name: Go Stateful
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: taas
          POSTGRES_PASSWORD: taas
          POSTGRES_DB: taas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taas -d taas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TAAS_TEST_POSTGRES_DSN: postgres://taas:taas@127.0.0.1:5432/taas?sslmode=disable
      TAAS_TEST_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run stateful Go integration coverage
        run: go test ./internal/store ./internal/api ./internal/service

  node:
    name: Node
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run JavaScript test suite
        run: npm test

  contracts:
    name: Contract Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate OpenAPI and SDK contracts
        run: npm run contract-check

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run companion-core tests
        run: cargo test -p companion-core

  demo-container:
    name: Demo Container Build
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build demo container image
        run: docker build -t taas-demo:${{ github.sha }} .
