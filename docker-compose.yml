version: "3.9"

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: taas
      POSTGRES_PASSWORD: taas
      POSTGRES_DB: taas
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:

